<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網站架構 - 聯絡我們</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .contact-form {
            max-width: 600px;
            margin: 2rem auto;
            background-color: var(--light-color);
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }
    </style>
</head>
<body>
    <!-- 導航欄 -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">Logo</div>
            <ul class="nav-menu">
                <li><a href="../index.html">首頁</a></li>
                <li><a href="about.html">關於我們</a></li>
                <li><a href="services.html">服務</a></li>
                <li><a href="contact.html" class="active">聯絡我們</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 頁首 -->
    <header class="hero">
        <div class="hero-content">
            <h1>聯絡我們</h1>
            <p>我們很樂意聽取您的意見</p>
        </div>
    </header>

    <!-- 主要內容 -->
    <main class="main-content">
        <section class="features">
            <div class="container">
                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <label for="name">名稱 *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">電子郵件 *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">主題 *</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="message">消息 *</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">發送消息</button>
                    <div id="contactMessage" class="message" style="margin-top: 1rem;"></div>
                </form>
            </div>
        </section>
    </main>

    <!-- 頁腳 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 網站架構範例。版權所有。</p>
            <div class="social-links">
                <a href="#">Facebook</a>
                <a href="#">Twitter</a>
                <a href="#">LinkedIn</a>
            </div>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // 聯絡表單提交處理
        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const form = e.target;
            const messageDiv = document.getElementById('contactMessage');
            
            // 簡單的驗證
            const name = form.querySelector('#name').value;
            const email = form.querySelector('#email').value;
            
            if (name.trim() && email.trim()) {
                messageDiv.textContent = '感謝您的消息！我們會儘快回覆您。';
                messageDiv.classList.add('success');
                messageDiv.classList.remove('error');
                form.reset();
                
                setTimeout(() => {
                    messageDiv.textContent = '';
                    messageDiv.classList.remove('success');
                }, 3000);
            } else {
                messageDiv.textContent = '請填寫所有必填字段。';
                messageDiv.classList.add('error');
                messageDiv.classList.remove('success');
            }
        });
    </script>
</body>
</html>
